name: Feature request
description: Suggest an idea or improvement for WatchWarden
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What's frustrating about the current behavior?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like WatchWarden to do? How would it look or behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Home lab (1-5 hosts)
        - Small team (5-20 hosts)
        - Large cluster (20+ hosts)
        - Solo mode only
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context — integrations (Home Assistant, Prometheus), environment details, screenshots.

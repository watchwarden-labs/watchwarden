name: Beta Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'

permissions:
  contents: write
  packages: write

jobs:
  test-controller:
    name: Controller Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: watchwarden_test
          POSTGRES_USER: watchwarden
          POSTGRES_PASSWORD: watchwarden
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watchwarden"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: controller
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          DATABASE_URL: postgresql://watchwarden:watchwarden@localhost:5432/watchwarden_test

  test-agent:
    name: Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - run: go vet ./...
      - run: go test -race ./... -count=1

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  publish-packages-beta:
    name: Publish npm Packages (Beta)
    needs: [test-controller, test-agent, test-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set beta version
        run: |
          BETA_VERSION="0.0.0-beta.$(date +%Y%m%d%H%M%S)"
          cd packages/types && npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version
          cd ../sdk && npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version
          cd ../sdk && npm pkg set "dependencies.@watchwarden/types=$BETA_VERSION"

      - name: Build and publish
        run: |
          cd packages/types && npm install && npm run build && npm publish --provenance --access public --tag beta
          cd ../sdk && npm install && npm run build && npm publish --provenance --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Build & Release Beta
    needs: [test-controller, test-agent, test-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Calculate beta version
        id: version
        run: |
          # Get latest beta tag
          LATEST_BETA=$(git tag -l 'v*-beta.*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_BETA" ]; then
            # No beta tags — get latest release tag for base version
            LATEST_RELEASE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '\-' | head -1)
            if [ -z "$LATEST_RELEASE" ]; then
              NEW_VERSION="v0.1.0-beta.1"
            else
              # Strip v prefix, increment patch, add beta.1
              BASE=$(echo "$LATEST_RELEASE" | sed 's/^v//')
              MAJOR=$(echo "$BASE" | cut -d. -f1)
              MINOR=$(echo "$BASE" | cut -d. -f2)
              PATCH=$(echo "$BASE" | cut -d. -f3)
              NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))-beta.1"
            fi
          else
            # Increment beta number
            BASE=$(echo "$LATEST_BETA" | sed 's/-beta\.[0-9]*//')
            BETA_NUM=$(echo "$LATEST_BETA" | grep -oP 'beta\.\K[0-9]+')
            NEW_VERSION="${BASE}-beta.$((BETA_NUM + 1))"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Beta version: $NEW_VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Controller
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ./controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/watchwarden-controller:beta
            ghcr.io/${{ github.repository_owner }}/watchwarden-controller:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=controller
          cache-to: type=gha,scope=controller,mode=max

      - name: Build and push Agent
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ./agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/watchwarden-agent:beta
            ghcr.io/${{ github.repository_owner }}/watchwarden-agent:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,scope=agent,mode=max

      - name: Build and push UI
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ./ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/watchwarden-ui:beta
            ghcr.io/${{ github.repository_owner }}/watchwarden-ui:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,scope=ui,mode=max

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Beta release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub pre-release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const registry = 'ghcr.io/${{ github.repository_owner }}';

            let body = `## Docker Images\n\n`;
            body += `| Service | Image |\n`;
            body += `|---------|-------|\n`;
            body += `| Controller | \`${registry}/watchwarden-controller:${version}\` |\n`;
            body += `| Agent | \`${registry}/watchwarden-agent:${version}\` |\n`;
            body += `| UI | \`${registry}/watchwarden-ui:${version}\` |\n\n`;
            body += `All images are also tagged as \`beta\`.\n`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `${version}`,
              body,
              prerelease: true,
            });

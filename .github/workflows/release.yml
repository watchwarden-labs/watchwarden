name: Release

on:
  workflow_dispatch:
    inputs:
      version_strategy:
        description: 'Version increment strategy'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  test-controller:
    name: Controller Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: watchwarden_test
          POSTGRES_USER: watchwarden
          POSTGRES_PASSWORD: watchwarden
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watchwarden"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: controller
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build shared types
        run: npm run build
        working-directory: packages/types
      - run: npm run lint
      - run: npm test
        env:
          DATABASE_URL: postgresql://watchwarden:watchwarden@localhost:5432/watchwarden_test

  test-agent:
    name: Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - run: go vet ./...
      - run: go test -race ./... -count=1

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - name: Build shared types
        run: npm run build
        working-directory: packages/types
      - run: npm run lint
      - run: npm test

  publish-packages:
    name: Publish npm Packages
    needs: [test-controller, test-agent, test-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Calculate version
        id: pkg_version
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '\-' | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="0.1.0"
          else
            VERSION=$(echo "$LATEST" | sed 's/^v//')
          fi
          STRATEGY="${{ inputs.version_strategy }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          case "$STRATEGY" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Set package versions
        run: |
          VERSION="${{ steps.pkg_version.outputs.version }}"
          cd packages/types && npm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ../sdk && npm version "$VERSION" --no-git-tag-version --allow-same-version
          # Update SDK's dependency on types to match
          cd ../sdk && npm pkg set "dependencies.@watchwarden/types=$VERSION"

      - name: Build packages
        run: |
          cd packages/types && npm install && npm run build
          cd ../sdk && npm install && npm run build

      - name: Publish @watchwarden/types
        run: cd packages/types && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @watchwarden/sdk
        run: cd packages/sdk && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Build & Release
    needs: [test-controller, test-agent, test-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          STRATEGY="${{ inputs.version_strategy }}"

          # Get latest release tag (exclude pre-releases)
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '\-' | head -1)

          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=1; PATCH=0
          else
            BASE=$(echo "$LATEST" | sed 's/^v//')
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
          fi

          case "$STRATEGY" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "previous=${LATEST:-none}" >> $GITHUB_OUTPUT
          echo "Release version: $NEW_VERSION (was: ${LATEST:-none}, strategy: $STRATEGY)"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.previous }}"
          VERSION="${{ steps.version.outputs.version }}"

          if [ "$PREV" = "none" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          echo "## ${VERSION}" > /tmp/changelog-entry.md
          echo "" >> /tmp/changelog-entry.md
          echo "Released: $(date -u +%Y-%m-%d)" >> /tmp/changelog-entry.md
          echo "" >> /tmp/changelog-entry.md

          # Features
          FEATS=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^feat' --no-merges 2>/dev/null || true)
          if [ -n "$FEATS" ]; then
            echo "### Features" >> /tmp/changelog-entry.md
            echo "$FEATS" >> /tmp/changelog-entry.md
            echo "" >> /tmp/changelog-entry.md
          fi

          # Bug fixes
          FIXES=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^fix' --no-merges 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            echo "### Bug Fixes" >> /tmp/changelog-entry.md
            echo "$FIXES" >> /tmp/changelog-entry.md
            echo "" >> /tmp/changelog-entry.md
          fi

          # Other changes
          OTHER=$(git log "$RANGE" --pretty=format:'- %s (%h)' --no-merges --invert-grep --grep='^feat' --grep='^fix' 2>/dev/null | head -20 || true)
          if [ -n "$OTHER" ]; then
            echo "### Other Changes" >> /tmp/changelog-entry.md
            echo "$OTHER" >> /tmp/changelog-entry.md
            echo "" >> /tmp/changelog-entry.md
          fi

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            cat /tmp/changelog-entry.md CHANGELOG.md > /tmp/changelog-full.md
            mv /tmp/changelog-full.md CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/changelog-entry.md >> CHANGELOG.md
          fi

          # Save release notes for GitHub release
          cat /tmp/changelog-entry.md > /tmp/release-notes.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update changelog for ${{ steps.version.outputs.version }}"
          git push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Controller
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: ./controller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/watchwarden-controller:latest
            ghcr.io/${{ github.repository_owner }}/watchwarden-controller:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=controller
          cache-to: type=gha,scope=controller,mode=max
          sbom: true
          provenance: mode=max

      - name: Build and push Agent
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ./agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/watchwarden-agent:latest
            ghcr.io/${{ github.repository_owner }}/watchwarden-agent:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,scope=agent,mode=max
          sbom: true
          provenance: mode=max

      - name: Build and push UI
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: ./ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/watchwarden-ui:latest
            ghcr.io/${{ github.repository_owner }}/watchwarden-ui:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,scope=ui,mode=max
          sbom: true
          provenance: mode=max

      - name: Scan Controller image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/watchwarden-controller:${{ steps.version.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Create git tag
        run: |
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.version }}';
            const registry = 'ghcr.io/${{ github.repository_owner }}';

            let notes = '';
            try {
              notes = fs.readFileSync('/tmp/release-notes.md', 'utf8');
            } catch {
              notes = `Release ${version}`;
            }

            notes += `\n## Docker Images\n\n`;
            notes += `| Service | Image |\n`;
            notes += `|---------|-------|\n`;
            notes += `| Controller | \`${registry}/watchwarden-controller:${version}\` |\n`;
            notes += `| Agent | \`${registry}/watchwarden-agent:${version}\` |\n`;
            notes += `| UI | \`${registry}/watchwarden-ui:${version}\` |\n\n`;
            notes += `All images are also tagged as \`latest\`.\n\n`;
            notes += `### Quick deploy\n`;
            notes += `\`\`\`bash\n`;
            notes += `curl -O https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/docker-compose.production.yml\n`;
            notes += `docker compose -f docker-compose.production.yml up -d\n`;
            notes += `\`\`\`\n`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: version,
              body: notes,
              prerelease: false,
            });

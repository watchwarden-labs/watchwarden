server {
    listen 8080;

    # VIOLATION 1: Disable Nginx version disclosure in Server response header
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # VIOLATION 2: CSP hardening. 
    # Option A (Active): 'style-src 'self'' removes 'unsafe-inline' to protect against CSS-injection XSS.
    # Option B (Fallback): If the application requires inline styles, replace it with:
    #   style-src 'self' 'sha256-<BASE64_HASH_OF_INLINE_STYLE>';
    # To determine which option applies, monitor browser console for CSP violation reports. If UI layout breaks or style errors appear, extract the required hash from the console error and add it to the policy.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; script-src 'self'; style-src 'self';" always;

    # VIOLATION 3: Missing HSTS header. 
    # Strict-Transport-Security enforces HTTPS connections. This is only effective when TLS is enabled (HTTPS).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Vite produces content-hashed filenames — cache forever, no revalidation needed
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # VIOLATION 4: Public /api/health endpoint leaks uptime/status information.
    # Restrict access to local loopback (127.0.0.1) and internal LAN subnets (192.168.0.0/16).
    location /api/health {
        allow 127.0.0.1;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://controller:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://controller:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        proxy_pass http://controller:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

